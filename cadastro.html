<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <title>Cadastro Force | Force Supplements</title>
</head>

<body>

    <main>
        <img class="logo2" src="image-Photoroom (2) copy.svg" alt="logo" />
        <p class="paragrafo">Cadastro</p>

        <form action="login.html">
            <label class="nome" for="nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required />
            <label for="email" class="mail">E-mail:</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required />
            <label class="cpf" for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="Digite seu CPF" required />
            <label class="cpf" for="cep">CEP:</label>
            <input type="text" id="" placeholder="Digite o CEP" required />
            <label class="end" for="end">Endereço:</label>
            <input type="text" id="end" placeholder="Digite seu endereço" required />
            <label for="senha" class="senha">Senha:</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required />

            <input class="bot" type="submit" value="Enviar">
    </main>

</body>

</html>
