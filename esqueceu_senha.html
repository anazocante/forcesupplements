<body>
    <main>
        <img class="logo2" src="image-Photoroom (2) copy.svg" alt="logo" />
        <p class="paragrafo">Esqueceu sua senha?</p>

        <form action="login.html">
            <label class="mail" for="email">E-mail:</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required />
            <label class="senha" for="nova senha">Nova senha:</label>
            <input type="password" id="nova senha" placeholder="Digite sua nova senha" required />
            <label class="conf" for="conf senha">Confirmar nova senha:</label>
            <input type="password" id="conf senha" placeholder="Confirme sua senha" required />

            <input class="bot" type="submit" value="Enviar" />
        </form>
    </main>
